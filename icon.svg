<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- ═══ OPÇÃO A — MINIMALISTA — Alvo verde sobre fundo escuro ═══ -->
  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f0d"/>
      <stop offset="100%" stop-color="#162019"/>
    </linearGradient>
    <linearGradient id="ringA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d367"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <radialGradient id="bullA" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>
  </defs>

  <!-- Fundo squircle (cantos super arredondados, estilo iOS) -->
  <rect x="0" y="0" width="512" height="512" rx="115" ry="115" fill="url(#bgA)"/>
  <rect x="0" y="0" width="512" height="512" rx="115" ry="115" fill="none" stroke="rgba(52,211,103,0.15)" stroke-width="3"/>

  <!-- Anéis do alvo concêntricos -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#ringA)" stroke-width="14" opacity="0.85"/>
  <circle cx="256" cy="256" r="135" fill="none" stroke="url(#ringA)" stroke-width="12" opacity="0.7"/>
  <circle cx="256" cy="256" r="90"  fill="none" stroke="url(#ringA)" stroke-width="10" opacity="0.55"/>

  <!-- Bullseye dourado central -->
  <circle cx="256" cy="256" r="42" fill="url(#bullA)"/>
  <circle cx="256" cy="256" r="42" fill="none" stroke="#0a0f0d" stroke-width="3"/>

  <!-- Mira (cruz tênue) -->
  <line x1="256" y1="40"  x2="256" y2="100" stroke="#34d367" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <line x1="256" y1="412" x2="256" y2="472" stroke="#34d367" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <line x1="40"  y1="256" x2="100" y2="256" stroke="#34d367" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <line x1="412" y1="256" x2="472" y2="256" stroke="#34d367" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
</svg>
